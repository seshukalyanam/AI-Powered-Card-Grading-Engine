# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-cardboss

on:
  push:
    branches:
      - streamlit
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://6311b21afc40415fbd24cc1406a5a0db.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_cb2059b587ea47d68b0a66752df91feb }}
        password: ${{ secrets.AzureAppService_ContainerPassword_b8cc5808a9a14d409f7df47ac2287e2b }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: 6311b21afc40415fbd24cc1406a5a0db.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_cb2059b587ea47d68b0a66752df91feb }}/cardboss:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'app-cardboss'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_a3820de90f534ae88a0d42db6cd19ad7 }}
        images: '6311b21afc40415fbd24cc1406a5a0db.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_cb2059b587ea47d68b0a66752df91feb }}/cardboss:${{ github.sha }}'